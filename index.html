<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Naturendringer over 10 år</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Fotoanalyse</p>
          <h1>Naturendringer over 10 år</h1>
        </div>
        <div class="time-label" aria-label="Tidsrom">
          <span id="beforeYearLabel">For 10 år siden</span>
          <span class="time-line" aria-hidden="true"></span>
          <span id="afterYearLabel">I dag</span>
        </div>
      </header>

      <section class="workspace" aria-label="Sammenligning av naturfoto">
        <div class="viewer-panel">
          <div class="year-picker" aria-label="Velg år som skal sammenlignes">
            <label for="beforeSelect">
              <span>Venstre bilde</span>
              <select id="beforeSelect"></select>
            </label>
            <label for="afterSelect">
              <span>Høyre bilde</span>
              <select id="afterSelect"></select>
            </label>
          </div>

          <div id="comparison" class="comparison-mount"></div>
        </div>
      </section>

      <section class="answer-panel" aria-label="Svar">
        <label class="answer-field" for="answerInput">
          <span>Hva har endret seg i landskapet?</span>
          <textarea
            id="answerInput"
            rows="4"
            placeholder="Skriv svaret ditt her..."
          ></textarea>
        </label>
      </section>
    </main>

    <script defer src="./bilder.js"></script>
    <script defer src="./app.js"></script>
  </body>
</html>
